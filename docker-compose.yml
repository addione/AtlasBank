version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: atlasbank-postgres
    environment:
      POSTGRES_USER: atlasbank
      POSTGRES_PASSWORD: atlasbank_password
      POSTGRES_DB: atlasbank_db
    ports:
      - "5433:5432"  # Using 5433 to avoid conflicts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atlasbank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlasbank"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: atlasbank-redis
    ports:
      - "6380:6379"  # Using 6380 to avoid conflicts
    volumes:
      - redis_data:/data
    networks:
      - atlasbank-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: atlasbank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2182:2181"  # Using 2182 to avoid conflicts
    networks:
      - atlasbank-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Message Queue
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: atlasbank-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9093:9093"  # Using 9093 for external access
    networks:
      - atlasbank-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Logging Server (using ELK stack - Elasticsearch)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: atlasbank-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"  # Using 9201 to avoid conflicts
      - "9301:9300"  # Using 9301 to avoid conflicts
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - atlasbank-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana (for log visualization)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: atlasbank-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5602:5601"  # Using 5602 to avoid conflicts
    networks:
      - atlasbank-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Main Application Service (Gin-based Go application)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlasbank-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: atlasbank
      DB_PASSWORD: atlasbank_password
      DB_NAME: atlasbank_db
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Kafka Configuration
      KAFKA_BROKER: kafka:9092
      
      # Elasticsearch Configuration
      ELASTICSEARCH_URL: http://elasticsearch:9200
      
      # Application Configuration
      APP_PORT: 8080
      GIN_MODE: debug
    ports:
      - "8081:8080"  # Using 8081 to avoid conflicts
    networks:
      - atlasbank-network
    restart: unless-stopped

networks:
  atlasbank-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
